services:
  trabalho03-linux:
    build: .
    image: williamwollert/trabalho03-clinica:latest
    container_name: trabalho03-linux
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - clinica-dados:/app/clinica
      - ./backups:/app/clinica/backups
      - ./logs:/app/clinica/logs
    stdin_open: true
    tty: true

volumes:
  clinica-dados:
    name: clinica-dados